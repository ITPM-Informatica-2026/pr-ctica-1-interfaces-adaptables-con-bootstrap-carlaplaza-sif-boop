<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FreshCart</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5fff8;
font-family: Arial;
}

/* NAVBAR */

.navbar-custom{
display:flex;
align-items:center;
gap:30px;
}

/* BOTON PROMOCION */

.btn-promo{
background:black;
color:white;
border-radius:30px;
padding:8px 20px;
font-size:14px;
}

/* TITULO */

.hero-title{
font-size:48px;
font-weight:bold;
}

/* BOTON */

.btn-comprar{
background:#ff7a00;
color:white;
border-radius:25px;
padding:12px 25px;
border:none;
}

/* IMAGEN PRINCIPAL */

.hero-img{
width:100%;
max-width:500px;
border-radius:10px;
}

/* CATEGORIAS */

.categoria{
background:white;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.categoria:hover{
transform:scale(1.05);
}

.categoria img{
width:60px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="container mt-4">

<div class="navbar-custom">

<h4 class="text-success">FreshCart</h4>

<a class="text-dark">Inicio</a>
<a class="text-dark">Tienda</a>
<a class="text-dark">Pages</a>
<a class="text-dark">Blog</a>
<a class="text-dark">Contacto</a>

</div>

</div>


<!-- HERO -->

<div class="container mt-5">

<div class="row align-items-center">

<!-- TEXTO -->

<div class="col-md-6">

<button class="btn-promo mb-3">
Envíos gratis desde $50
</button>

<p class="text-muted">
Bienvenido a FreshCart
</p>

<h1 class="hero-title">
Supermercado<br>
para alimentos<br>
frescos
</h1>

<button class="btn-comprar mt-3">
Comprar ahora
</button>

</div>


<!-- IMAGEN MUJER -->

<div class="col-md-6 text-center">

<img src="https://images.unsplash.com/photo-1606787366850-de6330128bfc" class="hero-img">

</div>

</div>

</div>


<!-- CATEGORIAS DESTACADAS -->

<div class="container mt-5">

<h5 class="mb-4">Categorías destacadas</h5>

<div class="row">

<div class="col-md-2 col-6 mb-3">
<div class="categoria">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
<p>Frutas</p>
</div>
</div>

<div class="col-md-2 col-6 mb-3">
<div class="categoria">
<img src="https://cdn-icons-png.flaticon.com/512/3081/3081967.png">
<p>Verduras</p>
</div>
</div>

<div class="col-md-2 col-6 mb-3">
<div class="categoria">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png">
<p>Lácteos</p>
</div>
</div>

<div class="col-md-2 col-6 mb-3">
<div class="categoria">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046769.png">
<p>Panadería</p>
</div>
</div>

<div class="col-md-2 col-6 mb-3">
<div class="categoria">
<img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
<p>Carnes</p>
</div>
</div>

<div class="col-md-2 col-6 mb-3">
<div class="categoria">
<img src="https://cdn-icons-png.flaticon.com/512/3081/3081980.png">
<p>Bebidas</p>
</div>
</div>

</div>

</div>

</body>
</html>
